name: MERN CI Pipeline

on:
  push:
    branches:
      - main

  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  FRONTEND_REPO: ${{ vars.FRONTEND_REPO }}
  BACKEND_REPO: ${{ vars.BACKEND_REPO }}
  DOCKER_BUILDKIT: 1

jobs:
  ci:

    runs-on: self-hosted

    permissions:
      contents: write

    steps:

    ####################################################
    # 1. Checkout Source
    ####################################################

    - name: Checkout Source
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    ####################################################
    # 2. Verify Installed Tools
    ####################################################

    - name: Verify Installed Tools
      run: |
        echo "===== JAVA ====="
        java -version

        echo "===== NODE ====="
        node -v

        echo "===== NPM ====="
        npm -v

        echo "===== DOCKER ====="
        docker --version

        echo "===== AWS ====="
        aws --version

        echo "===== TRIVY ====="
        trivy --version

        echo "===== KUBECTL ====="
        kubectl version --client

        echo "===== EKSCTL ====="
        eksctl version

    ####################################################
    # 3. Install Frontend Dependencies
    ####################################################

    - name: Install Frontend Packages
      working-directory: client
      run: npm ci

    ####################################################
    # 4. Install Backend Dependencies
    ####################################################

    - name: Install Backend Packages
      working-directory: server
      run: npm ci

    ####################################################
    # 5. SonarQube Scan
    ####################################################

    - name: SonarQube Scan
      uses: SonarSource/sonarqube-scan-action@v5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      with:
        args: >
          -Dsonar.projectKey=Mern-Application
          -Dsonar.projectName=Mern-Application
          -Dsonar.sources=client/app,server
          -Dsonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/.git/**,**/coverage/**

    ####################################################
    # 6. Sonar Quality Gate
    ####################################################

    - name: Sonar Quality Gate
      uses: SonarSource/sonarqube-quality-gate-action@v1.2.0
      timeout-minutes: 5
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    ####################################################
    # 7. Build Frontend
    ####################################################

    - name: Build Frontend
      working-directory: client
      run: npm run build

    ####################################################
    # 8. Build Backend Docker Image
    ####################################################

    - name: Build Backend Image
      run: |
        docker build \
          -t backend:${{ github.run_number }} \
          -f server/Dockerfile \
          server

    ####################################################
    # 9. Build Frontend Docker Image
    ####################################################

    - name: Build Frontend Image
      run: |
        docker build \
          --build-arg API_URL=http://localhost:3000/api \
          -t frontend:${{ github.run_number }} \
          -f client/Dockerfile \
          client

    ####################################################
    # 10. Trivy Filesystem Scan
    ####################################################

    - name: Trivy Filesystem Scan
      run: |
        trivy fs . \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --format table \
          --output trivy-fs-report.txt

    ####################################################
    # 11. Trivy Backend Image Scan
    ####################################################

    - name: Trivy Backend Image Scan
      run: |
        trivy image \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --format table \
          --output backend-trivy.txt \
          backend:${{ github.run_number }}

    ####################################################
    # 12. Trivy Frontend Image Scan
    ####################################################

    - name: Trivy Frontend Image Scan
      run: |
        trivy image \
          --severity HIGH,CRITICAL \
          --ignore-unfixed \
          --format table \
          --output frontend-trivy.txt \
          frontend:${{ github.run_number }}

    ####################################################
    # 13. Upload Security Reports
    ####################################################

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      with:
        name: security-reports
        path: |
          trivy-fs-report.txt
          backend-trivy.txt
          frontend-trivy.txt

    ####################################################
    # 14. Verify AWS Identity
    ####################################################

    - name: Verify AWS Identity
      run: |
        aws sts get-caller-identity

    ####################################################
    # 15. Verify Kubernetes Connectivity
    ####################################################

    - name: Verify Kubernetes Access
      run: |
        kubectl get nodes

    ####################################################
    # 16. Login to Amazon ECR
    ####################################################

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | docker login \
          --username AWS \
          --password-stdin \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

    ####################################################
    # 17. Tag Docker Images
    ####################################################

    - name: Tag Docker Images
      run: |
        docker tag backend:${{ github.run_number }} \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:${{ github.run_number }}

        docker tag frontend:${{ github.run_number }} \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:${{ github.run_number }}

    ####################################################
    # 18. Push Backend Image
    ####################################################

    - name: Push Backend Image
      run: |
        docker push \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:${{ github.run_number }}

    ####################################################
    # 19. Push Frontend Image
    ####################################################

    - name: Push Frontend Image
      run: |
        docker push \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:${{ github.run_number }}

    ####################################################
    # 20. Cleanup
    ####################################################

    - name: Cleanup Docker Images
      if: always()
      run: |
        docker image rm backend:${{ github.run_number }} || true

        docker image rm frontend:${{ github.run_number }} || true

        docker image rm \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$BACKEND_REPO:${{ github.run_number }} || true

        docker image rm \
          $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$FRONTEND_REPO:${{ github.run_number }} || true